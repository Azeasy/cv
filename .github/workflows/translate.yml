name: Generate Translation Preview

on:
  workflow_dispatch:
    inputs:
      lang:
        description: 'Target language DeepL code (e.g. RU, IT, DE, FR, ES)'
        required: true
        default: 'RU'

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run translation script
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python scripts/translate_segments.py --lang ${{ inputs.lang }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: translation-preview-${{ inputs.lang }}
          path: |
            latex/main.generated.${{ inputs.lang }}.tex
            translations/${{ inputs.lang }}.json
          retention-days: 14
