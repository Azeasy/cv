name: Build & Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache TeX Live packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: texlive-${{ runner.os }}-v1
          restore-keys: texlive-${{ runner.os }}-

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-cyrillic \
            texlive-lang-european \
            latexmk

      - name: Build EN CV
        run: |
          latexmk -pdf -interaction=nonstopmode -output-directory=build latex/main.tex
          if [ ! -f build/main.pdf ]; then
            echo "ERROR: EN PDF was not produced" && exit 1
          fi

      - name: Build language variants
        run: |
          for tex in latex/main_*.tex; do
            [ -f "$tex" ] || continue
            lang=$(basename "$tex" .tex | sed 's/main_//')
            echo "Building ${lang} CV from $tex…"
            latexmk -pdf -interaction=nonstopmode -output-directory=build "$tex" || true
            if [ ! -f "build/main_${lang}.pdf" ]; then
              echo "ERROR: ${lang} PDF was not produced" && exit 1
            fi
            echo "✓ build/main_${lang}.pdf produced"
          done

      - name: Assemble site
        run: |
          mkdir -p site

          # EN at root
          cp build/main.pdf site/cv.pdf

          # Language variants in subdirectories
          for tex in latex/main_*.tex; do
            [ -f "$tex" ] || continue
            lang=$(basename "$tex" .tex | sed 's/main_//')
            mkdir -p "site/${lang}"
            cp "build/main_${lang}.pdf" "site/${lang}/cv.pdf"
          done

          # Generate index.html dynamically
          LANG_LINKS=""
          for tex in latex/main_*.tex; do
            [ -f "$tex" ] || continue
            lang=$(basename "$tex" .tex | sed 's/main_//')
            LANG_LINKS="${LANG_LINKS}<a href=\"${lang}/cv.pdf\">CV (${lang^^})</a>"$'\n'
          done

          cat > site/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Azizzhan Supiyev — CV</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 24px; color: #1a1a1a; }
              h1 { font-size: 1.8rem; margin-bottom: 8px; }
              p  { color: #555; margin-bottom: 32px; }
              a  { display: inline-block; padding: 12px 24px; background: #0d6efd; color: #fff;
                   text-decoration: none; border-radius: 6px; margin-right: 12px; margin-bottom: 12px; }
              a:hover { background: #0a58ca; }
            </style>
          </head>
          <body>
            <h1>Azizzhan Supiyev</h1>
            <p>Software Engineer</p>
            <a href="cv.pdf">CV (EN)</a>
          ${LANG_LINKS}
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
