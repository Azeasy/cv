name: Build & Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache TeX Live packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: texlive-${{ runner.os }}-v1
          restore-keys: texlive-${{ runner.os }}-

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-cyrillic \
            texlive-lang-european \
            latexmk

      - name: Build EN CV
        run: |
          latexmk -pdf -interaction=nonstopmode -output-directory=build latex/main.tex
          if [ ! -f build/main.pdf ]; then
            echo "ERROR: EN PDF was not produced" && exit 1
          fi
          cp build/main.pdf cv.pdf

      - name: Build language variants
        run: |
          for tex in latex/main_*.tex; do
            [ -f "$tex" ] || continue
            lang=$(basename "$tex" .tex | sed 's/main_//')
            echo "Building $lang CV from $tex…"
            latexmk -pdf -interaction=nonstopmode -output-directory=build "$tex"
            if [ ! -f "build/main_${lang}.pdf" ]; then
              echo "ERROR: ${lang} PDF was not produced" && exit 1
            fi
            cp "build/main_${lang}.pdf" "cv_${lang}.pdf"
          done

      - name: Collect release assets
        id: assets
        run: |
          FILES="cv.pdf"
          for f in cv_*.pdf; do
            [ -f "$f" ] && FILES="$FILES"$'\n'"$f"
          done
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: ${{ steps.assets.outputs.files }}
