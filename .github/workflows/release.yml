name: Build & Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache TeX Live packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: texlive-${{ runner.os }}-v1
          restore-keys: texlive-${{ runner.os }}-

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-cyrillic \
            latexmk

      - name: Build EN CV
        run: |
          latexmk -pdf -interaction=nonstopmode -output-directory=build latex/main.tex
          if [ ! -f build/main.pdf ]; then
            echo "ERROR: EN PDF was not produced" && exit 1
          fi
          cp build/main.pdf cv.pdf

      - name: Build RU CV
        run: |
          latexmk -pdf -interaction=nonstopmode -output-directory=build latex/main_ru.tex
          if [ ! -f build/main_ru.pdf ]; then
            echo "ERROR: RU PDF was not produced" && exit 1
          fi
          cp build/main_ru.pdf cv_ru.pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            cv.pdf
            cv_ru.pdf
